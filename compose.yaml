services:
  app:
    build:
      context: .
      target: development

    init: true

    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"

    ports:
      - "127.0.0.1:3000:3000"

    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      - type: bind
        source: .
        target: /app
      - type: volume
        source: app_node_modules
        target: /app/node_modules
      - type: volume
        source: app_next_cache
        target: /app/.next

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s

  postgres:
    image: postgres:17-alpine
    container_name: ecommerce_postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  app_node_modules:
  app_next_cache:
  postgres_data: